name: PR Enforcer
on:
  pull_request:
    types: [opened, edited, synchronize]

permissions:
  pull-requests: write

jobs:
  enforce:
    runs-on: ubuntu-latest
    if: github.actor != 'dependabot[bot]'
    steps:
      - name: Validate PR Template
        uses: actions/github-script@v7
        with:
          script: |
            const body = context.payload.pull_request.body || '';
            const errors = [];

            if (!body.includes('## 📋 Description') || body.includes('<!-- Briefly describe')) {
              errors.push('❌ **Description** section must be filled in.');
            }

            if (!body.match(/(?:Fixes|Refs|Closes)\s+#\d+/i) && !body.includes('## 🔗 Related Issue')) {
              errors.push('⚠️ Consider linking a related issue (e.g., `Fixes #XX`).');
            }

            const checkboxes = body.match(/- \[[ x]\]/g) || [];
            const checked = body.match(/- \[x\]/g) || [];
            if (checkboxes.length > 0 && checked.length === 0) {
              errors.push('❌ Please check at least one item in the **Type of Change** section.');
            }

            if (errors.length > 0) {
              const comment = `### 🤖 PR Template Check\n\n${errors.join('\n')}\n\nPlease update your PR description to meet the template requirements.`;

              // Find existing bot comment to update
              const comments = await github.rest.issues.listComments({
                owner: context.repo.owner, repo: context.repo.repo,
                issue_number: context.payload.pull_request.number
              });
              const botComment = comments.data.find(c => c.body.includes('PR Template Check'));

              if (botComment) {
                await github.rest.issues.updateComment({
                  owner: context.repo.owner, repo: context.repo.repo,
                  comment_id: botComment.id, body: comment
                });
              } else {
                await github.rest.issues.createComment({
                  owner: context.repo.owner, repo: context.repo.repo,
                  issue_number: context.payload.pull_request.number, body: comment
                });
              }
            }
