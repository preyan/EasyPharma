name: Repository Maintenance

on:
  pull_request:
    types: [opened, edited, synchronize, reopened]
  workflow_run:
    workflows: ['CI']
    types: [completed]
  schedule:
    - cron: '0 0 * * *' # Daily at midnight
  workflow_dispatch:

permissions:
  issues: write
  pull-requests: write
  contents: write

jobs:
  pr-labeler:
    name: PR Size Labeler
    runs-on: ubuntu-latest
    timeout-minutes: 5
    if: github.event_name == 'pull_request'
    steps:
      - name: Label PR by Size
        uses: actions/github-script@v7
        with:
          script: |
            const pr = context.payload.pull_request;
            const changes = pr.additions + pr.deletions;

            const sizeLabels = [
              { label: 'size/XS', max: 10, color: '0e8a16' },
              { label: 'size/S', max: 50, color: '2cbe4e' },
              { label: 'size/M', max: 200, color: 'fbca04' },
              { label: 'size/L', max: 500, color: 'ee9513' },
              { label: 'size/XL', max: Infinity, color: 'b60205' }
            ];

            const size = sizeLabels.find(s => changes <= s.max);

            const currentLabels = pr.labels.map(l => l.name).filter(n => n.startsWith('size/'));
            for (const old of currentLabels) {
              if (old !== size.label) {
                 await github.rest.issues.removeLabel({
                   owner: context.repo.owner, repo: context.repo.repo,
                   issue_number: pr.number, name: old
                 }).catch(() => {});
              }
            }

            if (!currentLabels.includes(size.label)) {
              try {
                await github.rest.issues.getLabel({ owner: context.repo.owner, repo: context.repo.repo, name: size.label });
              } catch {
                await github.rest.issues.createLabel({ owner: context.repo.owner, repo: context.repo.repo, name: size.label, color: size.color });
              }

              await github.rest.issues.addLabels({
                owner: context.repo.owner, repo: context.repo.repo,
                issue_number: pr.number, labels: [size.label]
              });
              
              console.log(`Labeled PR #${pr.number} as ${size.label} (${changes} changes)`);
            }

  pr-enforcer:
    name: Validate PR Template
    runs-on: ubuntu-latest
    timeout-minutes: 5
    if: github.event_name == 'pull_request' && github.actor != 'dependabot[bot]'
    steps:
      - name: Validate PR Template
        uses: actions/github-script@v7
        with:
          script: |
            const body = context.payload.pull_request.body || '';
            const errors = [];

            if (!body.match(/^##\s*(?:[^\w\s]*\s*)?Description/mi) || body.includes('<!-- Briefly describe')) {
              errors.push('❌ **Description** section must be filled in.');
            }

            if (!body.match(/(?:Fixes|Refs|Closes)\s+#\d+/i) && !body.match(/^##\s*(?:[^\w\s]*\s*)?Related Issue/mi)) {
              errors.push('⚠️ Consider linking a related issue (e.g., `Fixes #XX`).');
            }

            const checkboxes = body.match(/- \[[ x]\]/g) || [];
            const checked = body.match(/- \[x\]/g) || [];
            if (checkboxes.length > 0 && checked.length === 0) {
              errors.push('❌ Please check at least one item in the **Type of Change** section.');
            }

            if (errors.length > 0) {
              const comment = `### 🤖 PR Template Check\n\n${errors.join('\n')}\n\nPlease update your PR description to meet the template requirements.`;

              const comments = await github.rest.issues.listComments({
                owner: context.repo.owner, repo: context.repo.repo,
                issue_number: context.payload.pull_request.number
              });
              const botComment = comments.data.find(c => c.body && c.body.includes('PR Template Check'));

              if (botComment) {
                await github.rest.issues.updateComment({
                  owner: context.repo.owner, repo: context.repo.repo,
                  comment_id: botComment.id, body: comment
                });
              } else {
                await github.rest.issues.createComment({
                  owner: context.repo.owner, repo: context.repo.repo,
                  issue_number: context.payload.pull_request.number, body: comment
                });
              }
            }

  dependabot-automerge:
    name: Auto-Merge Dependabot
    runs-on: ubuntu-latest
    timeout-minutes: 10
    if: github.event_name == 'pull_request' && github.actor == 'dependabot[bot]'
    steps:
      - name: Auto-approve Dependabot PR
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.pulls.createReview({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: context.payload.pull_request.number,
              event: 'APPROVE',
              body: '✅ Auto-approved by Dependabot Auto-Merge workflow.'
            });

      - name: Enable Auto-Merge
        run: gh pr merge --auto --squash "$PR_URL"
        env:
          PR_URL: ${{ github.event.pull_request.html_url }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  stale-cleanup:
    name: Manage Stale Issues/PRs
    runs-on: ubuntu-latest
    timeout-minutes: 5
    if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
    steps:
      - uses: actions/stale@v9
        with:
          stale-issue-message: 'This issue has been automatically marked as stale because it has not had recent activity. It will be closed in 7 days if no further activity occurs.'
          stale-pr-message: 'This PR has been automatically marked as stale because it has not had recent activity. It will be closed in 7 days if no further activity occurs.'
          close-issue-message: 'Closed — stale for 7 days with no activity.'
          close-pr-message: 'Closed — stale for 7 days with no activity.'
          days-before-stale: 30
          days-before-close: 7
          stale-issue-label: 'stale'
          stale-pr-label: 'stale'
          exempt-issue-labels: 'pinned,security,phase:2,phase:3,phase:4,phase:5,phase:6,phase:7,phase:8'
          exempt-pr-labels: 'pinned,security'

  ci-issue-updater:
    name: Update CI Status in Issues
    runs-on: ubuntu-latest
    timeout-minutes: 5
    if: github.event_name == 'workflow_run' && github.event.workflow_run.conclusion == 'success'
    steps:
      - name: Mark CI Checkbox on Recent Issues
        uses: actions/github-script@v7
        with:
          script: |
            const since = new Date(Date.now() - 60 * 60 * 1000).toISOString();

            const issues = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'closed',
              since: since,
              per_page: 20,
              sort: 'created',
              direction: 'desc'
            });

            for (const issue of issues.data) {
              if (!issue.title.match(/^\[(FEAT|FIX|CHORE|DOCS|REFACTOR|PERF|TEST|STYLE)\]:/)) {
                continue;
              }

              if (issue.body && issue.body.includes('- [ ] CI passes')) {
                const updatedBody = issue.body
                  .replace('- [ ] CI passes on `main`.', '- [x] CI passes on `main`.')
                  .replace('- [ ] CI passes.', '- [x] CI passes.')
                  .replace('- [ ] Build passes in CI.', '- [x] Build passes in CI.');

                if (updatedBody !== issue.body) {
                  await github.rest.issues.update({
                    owner: context.repo.owner,
                    repo: context.repo.repo,
                    issue_number: issue.number,
                    body: updatedBody
                  });
                  console.log(`Updated CI checkbox on issue #${issue.number}`);
                }
              }
            }

  daily-health-check:
    name: Daily Project Health Check
    runs-on: ubuntu-latest
    timeout-minutes: 20
    if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
    env:
      HUSKY: '0'
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: ./.github/actions/setup

      - name: Run Health Checks
        id: health
        run: |
          echo "## Daily Health Report" > /tmp/health-report.md
          echo "" >> /tmp/health-report.md
          echo "**Date:** $(date -u '+%Y-%m-%d %H:%M UTC')" >> /tmp/health-report.md
          echo "" >> /tmp/health-report.md

          FAILED=0

          echo "### Lint" >> /tmp/health-report.md
          if pnpm nx run-many -t lint 2>&1; then
            echo "✅ All projects pass linting" >> /tmp/health-report.md
          else
            echo "❌ Lint failures detected" >> /tmp/health-report.md
            FAILED=1
          fi

          echo "" >> /tmp/health-report.md
          echo "### Tests" >> /tmp/health-report.md
          if pnpm nx run-many -t test 2>&1; then
            echo "✅ All tests pass" >> /tmp/health-report.md
          else
            echo "❌ Test failures detected" >> /tmp/health-report.md
            FAILED=1
          fi

          echo "" >> /tmp/health-report.md
          echo "### Build" >> /tmp/health-report.md
          if pnpm nx run-many -t build 2>&1; then
            echo "✅ All projects build successfully" >> /tmp/health-report.md
          else
            echo "❌ Build failures detected" >> /tmp/health-report.md
            FAILED=1
          fi

          echo "failed=$FAILED" >> $GITHUB_OUTPUT

      - name: Open Issue on Failure
        if: steps.health.outputs.failed == '1'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const report = fs.readFileSync('/tmp/health-report.md', 'utf8');

            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `🚨 Daily Health Check Failed — ${new Date().toISOString().split('T')[0]}`,
              body: report,
              labels: ['bug', 'health-check']
            });
