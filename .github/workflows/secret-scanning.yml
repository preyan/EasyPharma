name: Secret Scanning
on:
  push:
    branches: [develop, main]
  pull_request:

jobs:
  scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Scan for Secrets
        uses: trufflesecurity/trufflehog@main
        with:
          extra_args: --only-verified --results=verified
