name: Coverage Badge
on:
  push:
    branches: [develop, main]
  pull_request:
    branches: [develop, main]

permissions:
  contents: write

jobs:
  coverage:
    runs-on: ubuntu-latest
    env:
      HUSKY: '0'
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: pnpm/action-setup@v4
        with:
          run_install: false

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'pnpm'

      - run: pnpm install --frozen-lockfile

      - name: Run Tests with Coverage
        run: pnpm nx run-many -t test -- --coverage --reporter=json-summary
        continue-on-error: true

      - name: Generate Badge
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');

            // Try to find coverage summary files
            let totalPct = 0;
            let count = 0;

            const searchPaths = [
              'coverage/coverage-summary.json',
              'apps/*/coverage/coverage-summary.json',
              'libs/*/coverage/coverage-summary.json'
            ];

            for (const pattern of searchPaths) {
              try {
                const files = require('child_process').execSync(`find . -path "./${pattern}" 2>/dev/null || true`).toString().trim().split('\n').filter(Boolean);
                for (const file of files) {
                  const data = JSON.parse(fs.readFileSync(file, 'utf8'));
                  if (data.total && data.total.lines) {
                    totalPct += data.total.lines.pct;
                    count++;
                  }
                }
              } catch {}
            }

            const pct = count > 0 ? Math.round(totalPct / count) : 0;
            const color = pct >= 80 ? 'brightgreen' : pct >= 60 ? 'yellow' : 'red';

            // Write badge URL to a file for README update workflow
            const badgeUrl = `https://img.shields.io/badge/coverage-${pct}%25-${color}`;
            fs.writeFileSync('/tmp/coverage-badge.txt', badgeUrl);
            console.log(`Coverage: ${pct}% — Badge: ${badgeUrl}`);
            core.setOutput('badge_url', badgeUrl);
            core.setOutput('coverage_pct', pct);
