name: Dynamic README
on:
  push:
    branches: [develop, main]
  schedule:
    - cron: '0 6 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-readme:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Update README
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const { execSync } = require('child_process');

            let readme = fs.readFileSync('README.md', 'utf8');
            const repo = `${context.repo.owner}/${context.repo.repo}`;
            const repoUrl = `https://github.com/${repo}`;

            // --- Dynamic Badges ---
            const pkg = JSON.parse(fs.readFileSync('package.json', 'utf8'));
            const version = pkg.version;

            const badges = [
              `![Version](https://img.shields.io/badge/version-v${version}-blue)`,
              `![CI](https://img.shields.io/github/actions/workflow/status/${repo}/ci.yml?branch=develop&label=CI)`,
              `![Issues](https://img.shields.io/github/issues/${repo})`,
              `![License](https://img.shields.io/badge/license-Proprietary-red)`,
              `![Node](https://img.shields.io/badge/node-22_LTS-green)`,
              `![Angular](https://img.shields.io/badge/Angular-21-dd0031)`,
              `![NestJS](https://img.shields.io/badge/NestJS-11-e0234e)`,
              `![Prisma](https://img.shields.io/badge/Prisma-7-2d3748)`,
            ].join('\n');

            // Replace badge block
            const badgeStart = '<!-- BADGES:START -->';
            const badgeEnd = '<!-- BADGES:END -->';
            if (readme.includes(badgeStart)) {
              readme = readme.replace(
                new RegExp(`${badgeStart}[\\s\\S]*?${badgeEnd}`),
                `${badgeStart}\n${badges}\n${badgeEnd}`
              );
            }

            // --- Phase Progress ---
            let planContent = '';
            try { planContent = fs.readFileSync('docs/plan.md', 'utf8') || ''; } catch {}
            if (!planContent) {
              try { planContent = execSync('cat README.md').toString(); } catch {}
            }

            const phases = [];
            for (let i = 1; i <= 8; i++) {
              // Count completed tasks for this phase
              const phaseRegex = new RegExp(`\\[PHASE ${i}\\][\\s\\S]*?(?=\\[PHASE ${i+1}\\]|$)`, 'i');
              const section = planContent.match(phaseRegex);
              if (section) {
                const completed = (section[0].match(/\[x\]/gi) || []).length;
                const total = (section[0].match(/\[[ x/]\]/gi) || []).length;
                const done = total > 0 && completed === total;
                phases.push(done ? '✅' : completed > 0 ? '🔄' : '⬜');
              } else {
                phases.push(i <= 1 ? '✅' : '⬜');
              }
            }

            const progressBar = `| Phase 1 | Phase 2 | Phase 3 | Phase 4 | Phase 5 | Phase 6 | Phase 7 | Phase 8 |\n|:---:|:---:|:---:|:---:|:---:|:---:|:---:|:---:|\n| ${phases.join(' | ')} |`;

            const progressStart = '<!-- PROGRESS:START -->';
            const progressEnd = '<!-- PROGRESS:END -->';
            if (readme.includes(progressStart)) {
              readme = readme.replace(
                new RegExp(`${progressStart}[\\s\\S]*?${progressEnd}`),
                `${progressStart}\n${progressBar}\n${progressEnd}`
              );
            }

            // --- Dependency Table ---
            const deps = { ...pkg.dependencies, ...pkg.devDependencies };
            const keyDeps = ['@angular/core', '@angular/cli', '@nestjs/core', '@prisma/client', 'nx', 'vitest', 'playwright', 'typescript'];
            let depTable = '| Package | Version |\n|---|---|\n';
            for (const dep of keyDeps) {
              if (deps[dep]) {
                depTable += `| \`${dep}\` | \`${deps[dep]}\` |\n`;
              }
            }

            const depStart = '<!-- DEPS:START -->';
            const depEnd = '<!-- DEPS:END -->';
            if (readme.includes(depStart)) {
              readme = readme.replace(
                new RegExp(`${depStart}[\\s\\S]*?${depEnd}`),
                `${depStart}\n${depTable}\n${depEnd}`
              );
            }

            // --- Contributors ---
            const contribStart = '<!-- CONTRIBUTORS:START -->';
            const contribEnd = '<!-- CONTRIBUTORS:END -->';
            if (readme.includes(contribStart)) {
              const contributors = await github.rest.repos.listContributors({
                owner: context.repo.owner, repo: context.repo.repo
              });
              const avatars = contributors.data
                .filter(c => c.type === 'User')
                .slice(0, 10)
                .map(c => `<a href="${c.html_url}"><img src="${c.avatar_url}" width="50" title="${c.login}"/></a>`)
                .join(' ');
              readme = readme.replace(
                new RegExp(`${contribStart}[\\s\\S]*?${contribEnd}`),
                `${contribStart}\n${avatars}\n${contribEnd}`
              );
            }

            // --- Stats ---
            const statsStart = '<!-- STATS:START -->';
            const statsEnd = '<!-- STATS:END -->';
            if (readme.includes(statsStart)) {
              const repoData = await github.rest.repos.get({ owner: context.repo.owner, repo: context.repo.repo });
              const openIssues = repoData.data.open_issues_count;
              const stars = repoData.data.stargazers_count;

              const locOutput = execSync("find apps libs -name '*.ts' -not -path '*/node_modules/*' 2>/dev/null | xargs wc -l 2>/dev/null | tail -1 || echo '0 total'").toString().trim();
              const loc = locOutput.split(' ')[0];

              const statsTable = `| Metric | Value |\n|---|---|\n| ⭐ Stars | ${stars} |\n| 🐛 Open Issues | ${openIssues} |\n| 📝 Lines of Code | ${Number(loc).toLocaleString()} |`;
              readme = readme.replace(
                new RegExp(`${statsStart}[\\s\\S]*?${statsEnd}`),
                `${statsStart}\n${statsTable}\n${statsEnd}`
              );
            }

            fs.writeFileSync('README.md', readme);

      - name: Commit README Updates
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add README.md
          git diff --staged --quiet || git commit -m "docs(readme): auto-update dynamic sections [skip ci]"
          git push || true
