name: Issue Automation
on:
  push:
    branches:
      - main
      - develop

permissions:
  contents: write
  issues: write

jobs:
  automate-issues:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: pnpm/action-setup@v4
        with:
          run_install: false

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Parse Commits, Version Bump, Changelog, and Issue Tracking
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const { execSync } = require('child_process');

            const commitRegex = /^(feat|fix|chore|docs|style|refactor|perf|test|ci|build)(?:\(([^)]+)\))?: (.+)$/;
            const repoUrl = `https://github.com/${context.repo.owner}/${context.repo.repo}`;
            const branch = context.ref.replace('refs/heads/', '');

            // Collect all parsed commits for changelog
            const changelogEntries = { Added: [], Fixed: [], Changed: [] };
            let hasBreaking = false;
            let hasFeat = false;
            let hasFix = false;

            for (const commit of context.payload.commits) {
              const message = commit.message.split('\n')[0];
              const match = message.match(commitRegex);
              if (!match) continue;

              const [_, type, scope, subject] = match;
              const shortSha = commit.id.substring(0, 7);
              const commitLink = `[\`${shortSha}\`](${repoUrl}/commit/${commit.id})`;

              // Categorize for changelog
              if (type === 'feat') {
                changelogEntries.Added.push(`- ${subject} (${commitLink})`);
                hasFeat = true;
              } else if (type === 'fix') {
                changelogEntries.Fixed.push(`- ${subject} (${commitLink})`);
                hasFix = true;
              } else {
                changelogEntries.Changed.push(`- **[${type}]** ${subject} (${commitLink})`);
              }

              // Skip issue creation if commit already references one
              if (commit.message.includes('Fixes #') || commit.message.includes('Refs #')) continue;

              // --- Issue Creation ---
              let labels = [];
              let issueBody = '';

              if (type === 'feat') {
                labels = ['feature', 'enhancement'];
                issueBody = [
                  `### User Story`,
                  `As a **developer**, I want to **${subject}**.`,
                  ``,
                  `### Technical Tasks`,
                  `- [x] Implementation committed in ${commitLink}`,
                  ``,
                  `### Definition of Done`,
                  `- [x] Code committed to \`${branch}\` branch.`,
                  `- [ ] Build passes in CI.`,
                ].join('\n');
              } else if (type === 'fix') {
                labels = ['bug'];
                issueBody = [
                  `### Description`, `${subject}`, ``,
                  `### Environment`,
                  `- **Branch:** \`${branch}\``,
                  `- **Commit:** ${commitLink}`,
                  `- **Runner:** GitHub Actions (ubuntu-latest)`, ``,
                  `### Proposed Fix`,
                  `Fix applied in commit ${commitLink}.`, ``,
                  `### Definition of Done`,
                  `- [x] Root cause identified and documented.`,
                  `- [x] Fix committed and referenced to this issue.`,
                  `- [ ] CI passes on \`main\`.`,
                ].join('\n');
              } else {
                labels = [type];
                issueBody = [
                  `### Summary`,
                  `**Type:** \`${type}\`${scope ? ` | **Scope:** \`${scope}\`` : ''}`, ``,
                  `${subject}`, ``,
                  `### Reference`,
                  `- **Branch:** \`${branch}\``,
                  `- **Commit:** ${commitLink}`, ``,
                  `### Definition of Done`,
                  `- [x] Change committed to \`${branch}\`.`,
                  `- [ ] CI passes.`,
                ].join('\n');
              }

              if (scope) labels.push(`area:${scope}`);

              try {
                for (const label of labels) {
                  try {
                    await github.rest.issues.getLabel({ owner: context.repo.owner, repo: context.repo.repo, name: label });
                  } catch {
                    await github.rest.issues.createLabel({ owner: context.repo.owner, repo: context.repo.repo, name: label, color: 'ededed' });
                  }
                }

                const issueTitle = `[${type.toUpperCase()}]: ${subject}`;
                const newIssue = await github.rest.issues.create({
                  owner: context.repo.owner, repo: context.repo.repo,
                  title: issueTitle, body: issueBody, labels,
                  assignees: [commit.author.username || context.actor]
                });
                console.log(`Issue #${newIssue.data.number} created.`);

                await new Promise(r => setTimeout(r, 2000));

                await github.rest.issues.createComment({
                  owner: context.repo.owner, repo: context.repo.repo,
                  issue_number: newIssue.data.number,
                  body: `✅ **Automated Resolution**\n\nResolved by commit ${repoUrl}/commit/${commit.id}\n\n| Field | Value |\n|---|---|\n| **Commit** | ${commitLink} |\n| **Branch** | \`${branch}\` |\n| **Author** | @${commit.author.username || context.actor} |`
                });

                await github.rest.issues.update({
                  owner: context.repo.owner, repo: context.repo.repo,
                  issue_number: newIssue.data.number, state: 'closed'
                });
                console.log(`Issue #${newIssue.data.number} closed.`);
              } catch (error) {
                console.log(`⚠️ Failed for "${message}": ${error.message}`);
              }
            }

            // --- Version Bump ---
            const pkg = JSON.parse(fs.readFileSync('package.json', 'utf8'));
            const [major, minor, patch] = pkg.version.split('.').map(Number);
            let newVersion;
            if (hasFeat) {
              newVersion = `${major}.${minor + 1}.0`;
            } else if (hasFix) {
              newVersion = `${major}.${minor}.${patch + 1}`;
            } else {
              newVersion = `${major}.${minor}.${patch + 1}`;
            }
            pkg.version = newVersion;
            fs.writeFileSync('package.json', JSON.stringify(pkg, null, 2) + '\n');
            console.log(`Version bumped to ${newVersion}`);

            // --- Changelog Update ---
            const date = new Date().toISOString().split('T')[0];
            let entry = `\n## [${newVersion}] - ${date}\n`;

            for (const [category, items] of Object.entries(changelogEntries)) {
              if (items.length > 0) {
                entry += `\n### ${category}\n${items.join('\n')}\n`;
              }
            }

            let changelog = fs.readFileSync('CHANGELOG.md', 'utf8');
            // Insert after the header block (after the SemVer line)
            const insertPoint = changelog.indexOf('\n## [');
            if (insertPoint !== -1) {
              changelog = changelog.slice(0, insertPoint) + '\n' + entry + changelog.slice(insertPoint);
            } else {
              changelog += '\n' + entry;
            }
            fs.writeFileSync('CHANGELOG.md', changelog);
            console.log('Changelog updated.');

            // --- Commit & Push ---
            execSync('git config user.name "github-actions[bot]"');
            execSync('git config user.email "github-actions[bot]@users.noreply.github.com"');
            execSync('git add package.json CHANGELOG.md');
            try {
              execSync(`git commit -m "chore(release): v${newVersion} [skip ci]"`);
              execSync('git push');
              console.log(`Released v${newVersion}`);
            } catch (e) {
              console.log('No changes to commit for release.');
            }
