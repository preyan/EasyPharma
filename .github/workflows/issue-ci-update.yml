name: Issue CI Status Update
on:
  workflow_run:
    workflows: ['CI']
    types: [completed]

permissions:
  issues: write

jobs:
  update-issues:
    if: github.event.workflow_run.conclusion == 'success'
    runs-on: ubuntu-latest
    steps:
      - name: Mark CI Checkbox on Recent Issues
        uses: actions/github-script@v8
        with:
          script: |
            // Find issues created by the Issue Automation workflow in the last hour
            const since = new Date(Date.now() - 60 * 60 * 1000).toISOString();

            const issues = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'closed',
              since: since,
              per_page: 20,
              sort: 'created',
              direction: 'desc'
            });

            for (const issue of issues.data) {
              // Only process auto-generated issues (they have [TYPE]: prefix)
              if (!issue.title.match(/^\[(FEAT|FIX|CHORE|DOCS|REFACTOR|PERF|TEST|STYLE)\]:/)) {
                continue;
              }

              // Check if the body has an unchecked CI checkbox
              if (issue.body && issue.body.includes('- [ ] CI passes')) {
                const updatedBody = issue.body
                  .replace('- [ ] CI passes on `main`.', '- [x] CI passes on `main`.')
                  .replace('- [ ] CI passes.', '- [x] CI passes.')
                  .replace('- [ ] Build passes in CI.', '- [x] Build passes in CI.');

                if (updatedBody !== issue.body) {
                  await github.rest.issues.update({
                    owner: context.repo.owner,
                    repo: context.repo.repo,
                    issue_number: issue.number,
                    body: updatedBody
                  });
                  console.log(`Updated CI checkbox on issue #${issue.number}`);
                }
              }
            }
