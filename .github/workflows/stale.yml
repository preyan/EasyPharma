name: Stale Issue Closer
on:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:

permissions:
  issues: write
  pull-requests: write

jobs:
  stale:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/stale@v9
        with:
          stale-issue-message: '⏰ This issue has been automatically marked as stale because it has not had recent activity. It will be closed in 7 days if no further activity occurs.'
          stale-pr-message: '⏰ This PR has been automatically marked as stale because it has not had recent activity. It will be closed in 7 days if no further activity occurs.'
          close-issue-message: '🔒 This issue was closed because it has been stale for 7 days with no activity.'
          close-pr-message: '🔒 This PR was closed because it has been stale for 7 days with no activity.'
          days-before-stale: 30
          days-before-close: 7
          stale-issue-label: 'stale'
          stale-pr-label: 'stale'
          exempt-issue-labels: 'pinned,security,phase:2,phase:3,phase:4,phase:5,phase:6,phase:7,phase:8'
          exempt-pr-labels: 'pinned,security'
