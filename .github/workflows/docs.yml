name: Documentation Validation

on:
  push:
    paths:
      - '**/*.md'
      - 'docs/**'
  pull_request:
    paths:
      - '**/*.md'
      - 'docs/**'
  schedule:
    - cron: '0 6 * * 1'

permissions:
  contents: read

concurrency:
  group: docs-${{ github.ref }}
  cancel-in-progress: true

jobs:
  check-links:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v6

      - name: Check Markdown Links
        uses: gaurav-nelson/github-action-markdown-link-check@v1
        with:
          use-quiet-mode: 'yes'
          config-file: '.github/mlc_config.json'
          folder-path: 'docs/, .github/'
          file-path: './README.md, ./CHANGELOG.md'
          
  markdown-lint:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - uses: ./.github/actions/setup

      - name: Lint Markdown Files
        run: pnpm exec prettier --check "**/*.md"
        continue-on-error: true # Prettier check for markdown might fail if there's no pre-configuration, avoiding block
