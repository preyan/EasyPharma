name: Swagger Spec Diff
on:
  pull_request:
    branches: [develop, main]
    paths:
      - 'apps/api/**'

permissions:
  pull-requests: write

jobs:
  swagger-diff:
    runs-on: ubuntu-latest
    env:
      HUSKY: '0'
    steps:
      - name: Checkout PR
        uses: actions/checkout@v6

      - uses: pnpm/action-setup@v4
        with:
          run_install: false

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'pnpm'

      - run: pnpm install --frozen-lockfile

      - name: Build API (PR branch)
        run: pnpm nx build api
        continue-on-error: true

      - name: Generate Swagger Spec (PR)
        run: |
          # Start API briefly to export swagger spec
          timeout 10 node dist/apps/api/main.js &
          sleep 5
          curl -s http://localhost:3000/api-json > /tmp/swagger-pr.json || echo '{}' > /tmp/swagger-pr.json
          kill %1 2>/dev/null || true

      - name: Checkout Base
        uses: actions/checkout@v6
        with:
          ref: ${{ github.event.pull_request.base.ref }}
          path: base

      - name: Build API (Base)
        run: |
          cd base && pnpm install --frozen-lockfile && pnpm nx build api
        continue-on-error: true

      - name: Generate Swagger Spec (Base)
        run: |
          cd base
          timeout 10 node dist/apps/api/main.js &
          sleep 5
          curl -s http://localhost:3000/api-json > /tmp/swagger-base.json || echo '{}' > /tmp/swagger-base.json
          kill %1 2>/dev/null || true

      - name: Diff Swagger Specs
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            let prSpec = {}, baseSpec = {};
            try { prSpec = JSON.parse(fs.readFileSync('/tmp/swagger-pr.json', 'utf8')); } catch {}
            try { baseSpec = JSON.parse(fs.readFileSync('/tmp/swagger-base.json', 'utf8')); } catch {}

            const prPaths = Object.keys(prSpec.paths || {});
            const basePaths = Object.keys(baseSpec.paths || {});
            const added = prPaths.filter(p => !basePaths.includes(p));
            const removed = basePaths.filter(p => !prPaths.includes(p));

            if (added.length === 0 && removed.length === 0) {
              console.log('No API changes detected.');
              return;
            }

            let body = '### 🔄 Swagger API Diff\n\n';
            if (added.length > 0) body += `**Added Endpoints:**\n${added.map(p => '- `' + p + '`').join('\n')}\n\n`;
            if (removed.length > 0) body += `**Removed Endpoints:**\n${removed.map(p => '- `' + p + '`').join('\n')}\n\n`;

            const comments = await github.rest.issues.listComments({
              owner: context.repo.owner, repo: context.repo.repo,
              issue_number: context.payload.pull_request.number
            });
            const existing = comments.data.find(c => c.body.includes('Swagger API Diff'));

            if (existing) {
              await github.rest.issues.updateComment({ owner: context.repo.owner, repo: context.repo.repo, comment_id: existing.id, body });
            } else {
              await github.rest.issues.createComment({ owner: context.repo.owner, repo: context.repo.repo, issue_number: context.payload.pull_request.number, body });
            }
